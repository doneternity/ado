name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: ado, POSTGRES_PASSWORD: ado, POSTGRES_DB: ado }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ado -d ado"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 30
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }
      - name: Vet
        run: cd backend && go vet ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: backend
          version: latest
      - name: Test
        env:
          DATABASE_URL: postgres://ado:ado@localhost:5432/ado?sslmode=disable
          REDIS_URL: redis://localhost:6379
          MAIL_FROM: "ADO <noreply@example.com>"
        run: cd backend && go test -race ./...

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: 'frontend/package-lock.json' }
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint
      - run: cd frontend && npm run typecheck
      - run: cd frontend && npm test -- --run

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ado:ci
