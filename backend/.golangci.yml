version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  exclusions:
    rules:
      - path: internal/store/db/
        linters:
          - unused
          - errcheck
      - linters: [errcheck]
        text: "Error return value of `.*\\.Body\\.Close` is not checked"
      - path: _test\.go
        linters:
          - errcheck
      - path: ^tests/
        linters:
          - errcheck
      - linters: [errcheck]
        text: "Error return value of `.*\\.Close` is not checked"
        source: "defer "

formatters:
  enable:
    - gofmt
    - goimports
