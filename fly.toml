app = "ado"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8081"
  APP_ENV = "production"
  SESSION_COOKIE_SECURE = "true"
  GEMINI_BASE_URL = "https://generativelanguage.googleapis.com/v1beta/openai"
  MAILER = "console"
  LOG_LEVEL = "info"

[processes]
  app = "/entrypoint.sh"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    method = "get"
    path = "/api/health"

  [services.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"

[deploy]
  strategy = "rolling"
