app = "ado"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  PORT = "8080"
  APP_ENV = "production"
  SESSION_COOKIE_SECURE = "true"
  SESSION_IDLE_DAYS = "7"
  SESSION_ABSOLUTE_DAYS = "30"
  MAILER = "console"
  GEMINI_BASE_URL = "https://generativelanguage.googleapis.com/v1beta/openai"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
