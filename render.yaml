services:
  - type: web
    name: ado-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8080
      - key: APP_ENV
        value: production
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_IDLE_DAYS
        value: 7
      - key: SESSION_ABSOLUTE_DAYS
        value: 30
      - key: MAILER
        value: resend
      - key: GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai
      - key: REDIS_URL
        fromService:
          name: ado-redis
          type: redis
          property: connectionString
      # Set these in the Render dashboard after deploy:
      - key: DATABASE_URL
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: ADMIN_BOOTSTRAP_EMAIL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false

  - type: redis
    name: ado-redis
    plan: free
    ipAllowList: []
