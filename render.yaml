services:
  - type: web
    name: ado-api
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "8081"
      - key: APP_ENV
        value: production
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai
      - key: MAILER
        value: console
      - key: DATABASE_URL
        fromDatabase:
          name: ado-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: ADMIN_BOOTSTRAP_EMAIL
        sync: false
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: ado-db
    plan: free
    databaseName: ado
    user: ado
